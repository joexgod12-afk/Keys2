<!DOCTYPE html>
<html>
<head>
    <title>LambV2 Key System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(22, 33, 62, 0.95);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 90%;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            color: #e94560;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #888;
            margin-bottom: 30px;
        }
        .btn {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }
        .btn:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
        }
        #keyDisplay {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background: #0f3460;
            border-radius: 15px;
            border: 2px solid #e94560;
        }
        .key-label {
            color: #888;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #keyText {
            font-size: 24px;
            font-weight: bold;
            color: #00d9ff;
            letter-spacing: 3px;
            word-break: break-all;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
        }
        .copy-btn {
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            transition: all 0.3s;
        }
        .copy-btn:hover {
            transform: scale(1.05);
        }
        .info {
            font-size: 12px;
            color: #666;
            margin-top: 20px;
        }
        .info span {
            color: #e94560;
        }
        .loading {
            display: none;
            margin-top: 20px;
        }
        .spinner {
            border: 3px solid #333;
            border-top: 3px solid #e94560;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .note {
            background: rgba(233, 69, 96, 0.1);
            border-left: 3px solid #e94560;
            padding: 15px;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 13px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔐</div>
        <h1>LambV2 Executor</h1>
        <p class="subtitle">Premium Key System</p>
        
        <button class="btn" id="getKeyBtn" onclick="startKeyProcess()">Get Access Key</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #888;">Generating secure key...</p>
        </div>
        
        <div id="keyDisplay">
            <div class="key-label">Your Access Key</div>
            <div id="keyText">...</div>
            <button class="copy-btn" onclick="copyKey()">📋 Copy to Clipboard</button>
            <p class="info">
                <span>⚡</span> Key expires in 24 hours<br>
                <span>🔒</span> Single device only (HWID locked)
            </p>
        </div>
        
        <div class="note">
            <strong>Note:</strong> Complete the verification process to receive your key. Each key is unique and tied to your device.
        </div>
    </div>

    <script>
        // JSONBin credentials
        const JSONBIN_KEY = '$2a$10$gH.Mj4PLJrkLr2rew4nCg.iCn3Cu2qAFkq1PFMSPyngGpouE1mrCS';
        const BIN_ID = '69e561b6856a6821894fe897';
        const LINKVERTISE_ID = ''; // Add your Linkvertise ID here for monetization
        
        function generateKey() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let key = '';
            for (let i = 0; i < 16; i++) {
                if (i > 0 && i % 4 === 0) key += '-';
                key += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return key;
        }
        
        function startKeyProcess() {
            const btn = document.getElementById('getKeyBtn');
            const loading = document.getElementById('loading');
            const keyDisplay = document.getElementById('keyDisplay');
            
            btn.disabled = true;
            btn.textContent = 'Processing...';
            loading.style.display = 'block';
            
            // Simulate verification delay (2 seconds)
            setTimeout(() => {
                const key = generateKey();
                const expires = new Date();
                expires.setHours(expires.getHours() + 24);
                
                // Save to JSONBin (in production)
                saveKeyToDatabase(key, expires);
                
                // Show key
                loading.style.display = 'none';
                keyDisplay.style.display = 'block';
                document.getElementById('keyText').textContent = key;
                btn.textContent = 'Key Generated!';
            }, 2000);
        }
        
        async function saveKeyToDatabase(key, expires) {
            // This would save to JSONBin in production
            // For demo, we just log it
            console.log('Key generated:', key);
            console.log('Expires:', expires);

        }
        
        function copyKey() {
            const key = document.getElementById('keyText').textContent;
            navigator.clipboard.writeText(key).then(() => {
                const btn = document.querySelector('.copy-btn');
                const originalText = btn.textContent;
                btn.textContent = '✅ Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }
    </script>
</body>
</html>
