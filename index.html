<!DOCTYPE html>
<html>
<head>
    <title>Test API</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; padding: 50px; }
        button { padding: 20px; font-size: 18px; cursor: pointer; }
        #result { margin-top: 20px; padding: 20px; background: #333; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>API Test</h1>
    <button onclick="testDirect()">Test Direct (Will Fail)</button>
    <button onclick="testProxy()">Test With Proxy</button>
    <div id="result"></div>

    <script>
        const authToken = 'Xk9mP2vQ8nR4wL7jH3bF6cE1dA5gK0tY';
        const HWID = 'TEST1234567890AB';
        const targetUrl = 'https://lambv2executor.42web.io/api.php?action=generate&auth=' + authToken + '&hwid=' + HWID;
        
        function showResult(text) {
            document.getElementById('result').innerHTML += '<p>' + text + '</p>';
        }
        
        async function testDirect() {
            showResult('Testing direct (expected to fail)...');
            try {
                const response = await fetch(targetUrl);
                const data = await response.text();
                showResult('Direct: SUCCESS - ' + data);
            } catch (e) {
                showResult('Direct: FAILED - ' + e.message);
            }
        }
        
        async function testProxy() {
            showResult('Testing with proxy...');
            try {
                const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl);
                showResult('Proxy URL: ' + proxyUrl);
                
                const response = await fetch(proxyUrl);
                showResult('Response status: ' + response.status);
                
                const text = await response.text();
                showResult('Response text: ' + text);
                
                try {
                    const data = JSON.parse(text);
                    showResult('Parsed JSON: ' + JSON.stringify(data));
                } catch (e) {
                    showResult('JSON parse error: ' + e.message);
                }
            } catch (e) {
                showResult('Proxy test FAILED: ' + e.message);
            }
        }
    </script>
</body>
</html>
