<!DOCTYPE html>
<html>
<head>
    <title>LambV2 Key System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(22, 33, 62, 0.95);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 90%;
        }
        .logo { font-size: 48px; margin-bottom: 20px; }
        h1 { color: #e94560; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        .btn {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4); }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .key-display {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            border: 2px solid #e94560;
            display: none;
        }
        .key-label { color: #888; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .key-text {
            font-family: 'Courier New', monospace;
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            letter-spacing: 3px;
        }
        .copy-btn {
            background: #00d4ff;
            color: #0f3460;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
        .copy-btn:hover { background: #00a8cc; }
        .expiry { color: #ff9800; font-size: 14px; margin-top: 15px; }
        .note {
            background: rgba(233, 69, 96, 0.1);
            border-left: 4px solid #e94560;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔐</div>
        <h1>LambV2 Executor</h1>
        <p class="subtitle">Premium Key System</p>
        
        <button class="btn" id="getKeyBtn">Get Access Key</button>
        
        <div class="key-display" id="keyDisplay">
            <p class="key-label">Your Access Key</p>
            <p class="key-text" id="keyText"></p>
            <button class="copy-btn" onclick="copyKey()">📋 Copy to Clipboard</button>
            <p class="expiry" id="expiryText"></p>
        </div>
        
        <div class="note">
            <strong>Note:</strong> Each key is unique and tied to your device. Key expires in 24 hours.
        </div>
    </div>

    <script>
        const AUTH_TOKEN = 'Xk9mP2vQ8nR4wL7jH3bF6cE1dA5gK0tY';
        const LINKVERTISE_URL = 'https://direct-link.net/5207978/Zs3jXGFnFPWY';
        
        // Check if coming from Linkvertise
        const referrer = document.referrer || '';
        const fromLinkvertise = referrer.includes('linkvertise.com') || 
                                referrer.includes('linkvertise') ||
                                referrer.includes('direct-link.net') ||
                                sessionStorage.getItem('fromLinkvertise') === 'true';
        
        // If not from Linkvertise, redirect there
        if (!fromLinkvertise) {
            // Check if we already have a valid key (they came back after getting key)
            const storedKey = localStorage.getItem('lambv2_key');
            const storedExpiry = localStorage.getItem('lambv2_expires');
            const hasValidKey = storedKey && storedExpiry && new Date(storedExpiry) > new Date();
            
            // Only redirect if they don't have a valid key yet
            if (!hasValidKey) {
                // Mark that we're going to Linkvertise so we know they came back
                sessionStorage.setItem('fromLinkvertise', 'true');
                window.location.href = LINKVERTISE_URL;
            }
        }
        
        // Validate auth
        const urlParams = new URLSearchParams(window.location.search);
        const authToken = urlParams.get('auth');
        
        if (authToken !== AUTH_TOKEN) {
            document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#1a1a2e;color:white;font-family:sans-serif;"><div style="text-align:center;padding:40px;background:#16213e;border-radius:20px;"><h1 style="color:#e94560;margin-bottom:20px;">Access Denied</h1><p>Please use the "Get Key" button in the executor.</p></div></div>';
        }
        
        // Generate HWID
        function generateHWID() {
            const nav = window.navigator;
            const screen = window.screen;
            const hwid = [nav.userAgent, nav.language, screen.width + 'x' + screen.height, screen.colorDepth, new Date().getTimezoneOffset()].join('|');
            let hash = 0;
            for (let i = 0; i < hwid.length; i++) {
                const char = hwid.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16).toUpperCase().padStart(16, '0').substring(0, 16);
        }
        
        const HWID = generateHWID();
        
        // Check stored key
        const storedKey = localStorage.getItem('lambv2_key');
        const storedHwid = localStorage.getItem('lambv2_hwid');
        
        if (storedKey && storedHwid === HWID) {
            const expiry = localStorage.getItem('lambv2_expires');
            if (expiry && new Date(expiry) > new Date()) {
                document.getElementById('getKeyBtn').textContent = 'Key Already Generated!';
                document.getElementById('getKeyBtn').disabled = true;
                document.getElementById('keyDisplay').style.display = 'block';
                document.getElementById('keyText').textContent = storedKey;
                document.getElementById('expiryText').innerHTML = '⚡ Key expires: ' + new Date(expiry).toLocaleString();
            }
        }
        
        // Generate random key
        function generateKey() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let key = '';
            for (let i = 0; i < 16; i++) {
                if (i > 0 && i % 4 === 0) key += '-';
                key += chars[Math.floor(Math.random() * chars.length)];
            }
            return key;
        }
        
        // Button click handler
        document.getElementById('getKeyBtn').addEventListener('click', function() {
            const btn = this;
            const keyDisplay = document.getElementById('keyDisplay');
            const keyText = document.getElementById('keyText');
            const expiryText = document.getElementById('expiryText');
            
            btn.disabled = true;
            btn.textContent = 'Generating...';
            
            // Generate key locally
            const newKey = generateKey();
            const expires = new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString();
            
            // Store locally
            localStorage.setItem('lambv2_key', newKey);
            localStorage.setItem('lambv2_hwid', HWID);
            localStorage.setItem('lambv2_expires', expires);
            
            // Display
            keyDisplay.style.display = 'block';
            keyText.textContent = newKey;
            expiryText.innerHTML = '⚡ Key expires: ' + new Date(expires).toLocaleString();
            btn.textContent = 'Key Generated!';
        });
        
        // Copy to clipboard
        function copyKey() {
            const keyText = document.getElementById('keyText').textContent;
            navigator.clipboard.writeText(keyText).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '✅ Copied!';
                setTimeout(() => btn.textContent = '📋 Copy to Clipboard', 2000);
            });
        }
    </script>
</body>
</html>
