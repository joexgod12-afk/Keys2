<!DOCTYPE html>
<html>
<head>
    <title>Test API</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; padding: 50px; }
        button { padding: 20px; font-size: 18px; cursor: pointer; margin: 10px; }
        #result { margin-top: 20px; padding: 20px; background: #333; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>API Test - Try Different Proxies</h1>
    <button onclick="testProxy1()">Test corsproxy.io</button>
    <button onclick="testProxy2()">Test thingproxy</button>
    <button onclick="testProxy3()">Test allorigins</button>
    <div id="result"></div>

    <script>
        const authToken = 'Xk9mP2vQ8nR4wL7jH3bF6cE1dA5gK0tY';
        const HWID = 'TEST1234567890AB';
        const targetUrl = 'https://lambv2executor.42web.io/api.php?action=generate&auth=' + authToken + '&hwid=' + HWID;
        
        function showResult(text) {
            document.getElementById('result').innerHTML += '<p>' + text + '</p>';
        }
        
        async function testProxy1() {
            showResult('<b>Testing corsproxy.io...</b>');
            try {
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);
                const response = await fetch(proxyUrl);
                const text = await response.text();
                showResult('corsproxy.io: ' + text.substring(0, 100));
            } catch (e) {
                showResult('corsproxy.io FAILED: ' + e.message);
            }
        }
        
        async function testProxy2() {
            showResult('<b>Testing thingproxy...</b>');
            try {
                const proxyUrl = 'https://thingproxy.freeboard.io/fetch/' + targetUrl;
                const response = await fetch(proxyUrl);
                const text = await response.text();
                showResult('thingproxy: ' + text.substring(0, 100));
            } catch (e) {
                showResult('thingproxy FAILED: ' + e.message);
            }
        }
        
        async function testProxy3() {
            showResult('<b>Testing allorigins...</b>');
            try {
                const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl);
                const response = await fetch(proxyUrl);
                const text = await response.text();
                showResult('allorigins: ' + text.substring(0, 100));
            } catch (e) {
                showResult('allorigins FAILED: ' + e.message);
            }
        }
    </script>
</body>
</html>
